[pytest]
asyncio_mode = strict
# El cliente Redis (app/db/redis.py) es un singleton a nivel de módulo, como
# corre en producción (un solo event loop de por vida del proceso). Con el
# scope de loop por default (function), pytest-asyncio crea un event loop
# nuevo por test y las conexiones cacheadas del singleton quedan atadas a un
# loop ya cerrado ("RuntimeError: Event loop is closed") en el segundo test
# async que corre. Session scope mantiene un solo loop para toda la corrida,
# igual que en producción.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
