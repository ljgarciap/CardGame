server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no sea un archivo real cae a index.html --
    # la navegación de esta app es imperativa (Navigator.push, sin rutas
    # nombradas), así que en la práctica siempre es la misma entrada, pero
    # esto igual cubre un F5/refresh en cualquier estado.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # El build de Flutter web no le pone hash al nombre de estos archivos
    # (a diferencia de lo que sí hace con los assets bajo /assets/) --
    # cachearlos "immutable" dejaba a los navegadores sirviendo la versión
    # vieja del bundle después de cada deploy, sin volver a pedirla nunca
    # (bug real: un fix de login recién desplegado no le llegaba a un
    # celular que ya había cargado la app antes).
    location ~* ^/(main\.dart\.js|flutter\.js|flutter_bootstrap\.js|flutter_service_worker\.js|version\.json|index\.html)$ {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|json)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
