<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MYTHOS — TCG donde todos los mitos existen a la vez.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MYTHOS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MYTHOS</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Un dispositivo que ya tenía instalado el service worker viejo
    // (cacheo agresivo offline-first, default de Flutter web previo a
    // este fix -- ver docs/memory.md 2026-07-20) puede seguir sirviendo
    // esa versión vieja indefinidamente: el chequeo de actualización del
    // navegador para flutter_service_worker.js (Dockerfile lo reemplaza
    // por uno mínimo que hace skipWaiting + clients.claim) pasa por
    // afuera del propio service worker, así que sí detecta el cambio --
    // pero por default un service worker nuevo no controla pestañas ya
    // abiertas hasta que activa. clients.claim() lo fuerza igual, y este
    // listener recarga UNA vez apenas eso pasa, para que el usuario no
    // tenga que cerrar la app ni limpiar nada a mano en cada deploy.
    if ('serviceWorker' in navigator) {
      let alreadyReloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (alreadyReloaded) return;
        alreadyReloaded = true;
        window.location.reload();
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
