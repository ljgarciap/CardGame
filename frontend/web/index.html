<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MYTHOS — TCG donde todos los mitos existen a la vez.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MYTHOS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MYTHOS</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Limpieza de una sola vez: builds anteriores registraban un service
    // worker con cacheo agresivo (offline-first, default de Flutter web)
    // que podía seguir sirviendo una versión vieja del bundle sin tocar la
    // red, incluso con headers no-cache en el servidor -- ver
    // docs/memory.md 2026-07-20. El build actual ya no registra ninguno
    // (--pwa-strategy=none en el Dockerfile), pero un dispositivo que ya
    // tenía el viejo instalado necesita este desregistro explícito; la
    // sola ausencia de body en el build nuevo no lo desinstala solo.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        registrations.forEach((registration) => registration.unregister());
      });
    }
    if ('caches' in window) {
      caches.keys().then((names) => names.forEach((name) => caches.delete(name)));
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
