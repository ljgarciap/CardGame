services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=card_game
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    restart: always
    ports:
      - "8025:8025" # web UI para inspeccionar correos en dev
      - "1025:1025" # SMTP

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    # Estado de partidas en tiempo real (docs/designs/realtime-match.md) —
    # store compartido entre workers/procesos de backend, no persiste a disco
    # a propósito (partidas en curso no necesitan sobrevivir un restart).

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/card_game
      - JWT_SECRET_KEY=dev-secret-change-in-production
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@cardgame.local
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - mailhog
      - redis

volumes:
  db_data:
