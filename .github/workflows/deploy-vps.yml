name: Deploy VPS

# Manual a propósito (workflow_dispatch, no push a master): este es un VPS
# de prueba compartido con otro proyecto (ZIA), no queremos un deploy
# automático en cada push mientras se valida que el pipeline funciona.
# Se puede pasar a automático más adelante si tiene sentido.
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/cardgame-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/cardgame-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build y push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          # Se hornea en el bundle JS en tiempo de build -- ver
          # frontend/lib/core/api_config.dart y frontend/Dockerfile. Tiene
          # que apuntar a donde el navegador del teléfono pueda llegar de
          # verdad (IP pública del VPS), no localhost.
          build-args: |
            API_BASE_URL=${{ vars.CARDGAME_API_BASE_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar docker-compose.prod.yml al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/cardgame"
          strip_components: 0

      - name: Deploy y migrar
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # El .env queda solo en el VPS, nunca en el repo -- docker
          # compose lo lee solo automáticamente al estar en el mismo
          # directorio que el compose file.
          script: |
            set -e
            cd ~/cardgame
            cat > .env <<EOF
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            DB_PASSWORD=${{ secrets.CARDGAME_DB_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.CARDGAME_JWT_SECRET }}
            SMTP_HOST=${{ secrets.CARDGAME_SMTP_HOST }}
            SMTP_PORT=${{ secrets.CARDGAME_SMTP_PORT }}
            SMTP_USE_TLS=${{ secrets.CARDGAME_SMTP_USE_TLS }}
            SMTP_FROM=${{ secrets.CARDGAME_SMTP_FROM }}
            SMTP_USER=${{ secrets.CARDGAME_SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.CARDGAME_SMTP_PASSWORD }}
            BACKEND_PORT=8001
            FRONTEND_PORT=8888
            MAILHOG_UI_PORT=8025
            EOF
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker compose -f docker-compose.prod.yml exec -T backend python -m app.db.seed
            docker compose -f docker-compose.prod.yml exec -T backend python -m app.db.seed_gacha_config
            docker compose -f docker-compose.prod.yml exec -T backend python -m app.db.seed_deck_config
            docker compose -f docker-compose.prod.yml exec -T backend python -m app.db.seed_superadmin

      - name: Esperar a que el backend esté saludable
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://${{ secrets.VPS_HOST }}:8001/api/health"; then
              echo "backend saludable"
              exit 0
            fi
            sleep 5
          done
          echo "el backend no respondió a tiempo"
          exit 1
